<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sweep Debug - PurgeX</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://unpkg.com/ethers@6.9.0/dist/ethers.umd.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <script src="js/sweeper.js"></script>
</head>
<body>
  <div class="container">
    <h1>🧹 Sweep Debug Test</h1>
    
    <div class="card">
      <h2>Connection Status</h2>
      <button class="btn btn-primary connect-wallet-btn" data-action="connect-wallet">
        Connect Wallet
      </button>
      <div class="account-info" style="display: none;">
        <span class="wallet-address" data-action="copy">0x0000...0000</span>
      </div>
    </div>

    <div class="card">
      <h2>Token Discovery Test</h2>
      <button class="btn btn-primary" onclick="testTokenDiscovery()">
        🔍 Test Token Discovery
      </button>
      <button class="btn btn-secondary" onclick="clearResults()">
        Clear
      </button>
    </div>

    <div class="card">
      <h2>Sweep Button Test</h2>
      <button class="btn btn-primary sweep-btn" data-action="sweep" disabled>
        Select Tokens to Sweep
      </button>
      <div id="sweep-status">
        Sweep button status: <span id="sweep-status-text">Disabled</span>
      </div>
    </div>

    <div class="card">
      <h2>Debug Console</h2>
      <div id="debug-output" style="background: #0f172a; padding: 1rem; border-radius: 8px; font-family: monospace; max-height: 300px; overflow-y: auto; color: #10b981;">
        Ready for testing...
      </div>
      <button class="btn btn-secondary" onclick="clearDebug()">Clear Debug</button>
    </div>
  </div>

  <script>
    function debug(message, type = 'info') {
      const output = document.getElementById('debug-output');
      const timestamp = new Date().toLocaleTimeString();
      const color = type === 'error' ? '#ef4444' : type === 'warn' ? '#f59e0b' : '#10b981';
      const div = document.createElement('div');
      div.style.color = color;
      div.textContent = `[${timestamp}] ${message}`;
      output.appendChild(div);
      output.scrollTop = output.scrollHeight;
    }

    function clearDebug() {
      document.getElementById('debug-output').innerHTML = '';
    }

    function clearResults() {
      clearDebug();
      document.getElementById('sweep-status-text').textContent = 'Disabled';
      const sweepBtn = document.querySelector('.sweep-btn');
      sweepBtn.disabled = true;
      sweepBtn.textContent = 'Select Tokens to Sweep';
    }

    async function testTokenDiscovery() {
      if (!window.purgeXApp || !window.purgeXApp.signer) {
        debug('❌ Please connect wallet first', 'error');
        return;
      }

      if (!window.dustSweeper) {
        debug('❌ Dust sweeper not loaded', 'error');
        return;
      }

      debug('🔍 Starting token discovery test...');
      
      try {
        await window.dustSweeper.loadTokenList();
        debug(`✅ Found ${window.dustSweeper.tokens.length} tokens`);
        
        // Simulate token selection
        if (window.dustSweeper.tokens.length > 0) {
          debug('🔄 Simulating token selection...');
          
          // Select first token
          const firstToken = window.dustSweeper.tokens[0];
          window.dustSweeper.selectedTokens.add({
            address: firstToken.address,
            symbol: firstToken.symbol,
            balance: firstToken.balance
          });
          
          window.dustSweeper.updateSummary();
          
          const sweepBtn = document.querySelector('.sweep-btn');
          const isEnabled = !sweepBtn.disabled;
          const btnText = sweepBtn.textContent;
          
          document.getElementById('sweep-status-text').textContent = isEnabled ? 'Enabled' : 'Disabled';
          
          debug(`📊 Sweep button status: ${isEnabled ? 'ENABLED' : 'DISABLED'}`);
          debug(`📊 Button text: "${btnText}"`);
          debug(`📊 Selected tokens: ${window.dustSweeper.selectedTokens.size}`);
          
          // Test sweep action
          debug('🧪 Testing sweep action...');
          sweepBtn.click();
          debug('✅ Sweep action triggered');
          
        } else {
          debug('⚠️ No tokens found to test with');
        }
        
      } catch (error) {
        debug(`❌ Error: ${error.message}`, 'error');
        console.error(error);
      }
    }

    // Monitor sweep button changes
    const observer = new MutationObserver((mutations) => {
      mutations.forEach((mutation) => {
        if (mutation.type === 'attributes' && mutation.attributeName === 'disabled') {
          const sweepBtn = document.querySelector('.sweep-btn');
          const isEnabled = !sweepBtn.disabled;
          document.getElementById('sweep-status-text').textContent = isEnabled ? 'Enabled' : 'Disabled';
          debug(`🔄 Sweep button ${isEnabled ? 'ENABLED' : 'DISABLED'}`);
        }
      });
    });

    // Start observing
    setTimeout(() => {
      const sweepBtn = document.querySelector('.sweep-btn');
      if (sweepBtn) {
        observer.observe(sweepBtn, { attributes: true });
        debug('👁️ Started monitoring sweep button');
      }
    }, 1000);

    // Override console methods
    const originalLog = console.log;
    const originalError = console.error;
    const originalWarn = console.warn;
    
    console.log = function(...args) {
      originalLog.apply(console, args);
      debug(args.join(' '), 'info');
    };
    
    console.error = function(...args) {
      originalError.apply(console, args);
      debug(args.join(' '), 'error');
    };
    
    console.warn = function(...args) {
      originalWarn.apply(console, args);
      debug(args.join(' '), 'warn');
    };

    // Initialize
    window.addEventListener('load', () => {
      debug('Sweep debug page loaded');
      debug(`Ethers.js version: ${ethers.version || 'v6.x'}`);
      debug(`Config loaded: ${!!window.CONFIG}`);
      debug(`App initialized: ${!!window.purgeXApp}`);
      debug(`Dust sweeper loaded: ${!!window.dustSweeper}`);
    });
  </script>
</body>
</html>
