<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PurgeX (PRGX) — Sweep Dust, Earn PRGX on PulseChain</title>
  <meta name="description" content="Convert worthless ERC-20 dust tokens into PRGX on PulseChain. Stake and earn 6.4 PRGX per second.">
  
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  
  <!-- CSS -->
  <link rel="stylesheet" href="css/styles.css">
  
  <!-- Ethers.js v6 -->
  <script src="https://unpkg.com/ethers@6.9.0/dist/ethers.umd.min.js"></script>
</head>
<body>
  
  <!-- Navigation -->
  <nav class="navbar">
    <div class="navbar-logo">PURGEX</div>
    <div class="navbar-links" id="navbarLinks">
      <a href="#/" class="nav-link">Home</a>
      <a href="#/sweep" class="nav-link">Sweep</a>
      <a href="#/staking" class="nav-link">Staking</a>
      <a href="#/tokenomics" class="nav-link">Tokenomics</a>
      <a href="#/contracts" class="nav-link">Contracts</a>
      <a href="#/about" class="nav-link">About</a>
    </div>
    <button class="wallet-btn" id="navWalletBtn">Connect Wallet</button>
    <div class="hamburger" id="hamburger">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </nav>
  
  <!-- Wrong Network Banner -->
  <div class="network-banner hidden" id="wrongNetworkBanner">
    ⚠️ You're on the wrong network.
    <button onclick="wallet.switchOrAddNetwork()">Switch to PulseChain</button>
  </div>
  
  <!-- Main Content Container -->
  <div class="page-container">
    <div id="app">
      <!-- Pages will be loaded here by router -->
    </div>
  </div>
  
  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>
  
  <!-- Modal Container -->
  <div class="modal-overlay hidden" id="modalOverlay">
    <div class="modal" id="modalContent">
      <!-- Modal content will be injected here -->
    </div>
  </div>
  
  <!-- JavaScript Dependencies -->
  
  <!-- Config first (no module - defines global CONFIG) -->
  <script src="js/config.js"></script>
  
  <!-- Modules that use ES6 imports/exports -->
  <script type="module" src="js/storage.js"></script>
  <script type="module" src="js/api.js"></script>
  <script type="module" src="js/search.js"></script>
  <script type="module" src="js/ui.js"></script>
  <script type="module" src="js/app.js"></script>
  
  <!-- Regular scripts (depend on CONFIG global, no imports) -->
  <script src="js/wallet.js"></script>
  <script src="js/tokens.js"></script>
  <script src="js/sweeper.js"></script>
  <script src="js/staking.js"></script>
  <script src="js/price.js"></script>
  <script src="js/router.js"></script>
  <script src="js/tokenomics.js"></script>
</body>
</html>
