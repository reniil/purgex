<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wallet Connection Test</title>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #0f172a;
      color: #f8fafc;
      padding: 2rem;
      max-width: 600px;
      margin: 0 auto;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 2rem;
      margin-bottom: 2rem;
    }
    .btn {
      background: #6366f1;
      color: white;
      border: none;
      padding: 1rem 2rem;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }
    .btn:hover {
      background: #4f46e5;
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .status {
      padding: 1rem;
      border-radius: 8px;
      margin: 1rem 0;
    }
    .success { background: rgba(16, 185, 129, 0.1); color: #10b981; }
    .error { background: rgba(239, 68, 68, 0.1); color: #ef4444; }
    .info { background: rgba(59, 130, 246, 0.1); color: #3b82f6; }
    code {
      background: #334155;
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      font-family: monospace;
    }
  </style>
  <script src="https://unpkg.com/ethers@6.9.0/dist/ethers.umd.min.js"></script>
</head>
<body>
  <h1>🔌 Wallet Connection Test</h1>
  
  <div class="card">
    <h2>Ethers.js Version Check</h2>
    <p>Ethers.js loaded: <code id="ethers-version">--</code></p>
    <p>Available methods: <code id="ethers-methods">--</code></p>
  </div>

  <div class="card">
    <h2>MetaMask Detection</h2>
    <button id="check-metamask" class="btn">Check MetaMask</button>
    <div id="metamask-status"></div>
  </div>

  <div class="card">
    <h2>Wallet Connection</h2>
    <button id="connect-wallet" class="btn">Connect Wallet</button>
    <div id="connection-status"></div>
  </div>

  <div class="card">
    <h2>Network Check</h2>
    <button id="check-network" class="btn">Check Network</button>
    <div id="network-status"></div>
  </div>

  <div class="card">
    <h2>Account Info</h2>
    <button id="get-account" class="btn">Get Account Info</button>
    <div id="account-info"></div>
  </div>

  <script>
    // Test ethers.js
    document.getElementById('ethers-version').textContent = ethers.version || 'v6.x';
    document.getElementById('ethers-methods').textContent = Object.keys(ethers).filter(k => typeof ethers[k] === 'function').slice(0, 5).join(', ');

    // Check MetaMask
    document.getElementById('check-metamask').addEventListener('click', async () => {
      const status = document.getElementById('metamask-status');
      
      if (typeof window.ethereum === 'undefined') {
        status.innerHTML = '<div class="status error">❌ MetaMask not detected</div>';
        return;
      }
      
      status.innerHTML = '<div class="status success">✅ MetaMask detected!</div>';
    });

    // Connect wallet
    document.getElementById('connect-wallet').addEventListener('click', async () => {
      const status = document.getElementById('connection-status');
      
      try {
        if (typeof window.ethereum === 'undefined') {
          throw new Error('MetaMask not installed');
        }

        const accounts = await window.ethereum.request({
          method: 'eth_requestAccounts'
        });

        if (accounts.length === 0) {
          throw new Error('No accounts found');
        }

        status.innerHTML = `
          <div class="status success">
            ✅ Wallet connected!<br>
            Account: <code>${accounts[0]}</code>
          </div>
        `;

      } catch (error) {
        status.innerHTML = `
          <div class="status error">
            ❌ Connection failed: ${error.message}
          </div>
        `;
        console.error('Connection error:', error);
      }
    });

    // Check network
    document.getElementById('check-network').addEventListener('click', async () => {
      const status = document.getElementById('network-status');
      
      try {
        const chainId = await window.ethereum.request({
          method: 'eth_chainId'
        });

        status.innerHTML = `
          <div class="status info">
            📡 Chain ID: <code>${chainId}</code><br>
            ${chainId === '0x171' ? '✅ PulseChain' : '⚠️ Not PulseChain'}
          </div>
        `;

      } catch (error) {
        status.innerHTML = `
          <div class="status error">
            ❌ Network check failed: ${error.message}
          </div>
        `;
      }
    });

    // Get account info
    document.getElementById('get-account').addEventListener('click', async () => {
      const info = document.getElementById('account-info');
      
      try {
        const provider = new ethers.BrowserProvider(window.ethereum);
        const signer = await provider.getSigner();
        const address = await signer.getAddress();
        const balance = await provider.getBalance(address);

        info.innerHTML = `
          <div class="status success">
            ✅ Account Info:<br>
            Address: <code>${address}</code><br>
            Balance: <code>${ethers.formatEther(balance)} PLS</code>
          </div>
        `;

      } catch (error) {
        info.innerHTML = `
          <div class="status error">
            ❌ Failed to get account info: ${error.message}
          </div>
        `;
      }
    });

    // Listen for account changes
    if (window.ethereum) {
      window.ethereum.on('accountsChanged', (accounts) => {
        console.log('Accounts changed:', accounts);
        document.getElementById('connection-status').innerHTML = `
          <div class="status info">
            🔄 Accounts changed: ${accounts.length > 0 ? accounts[0] : 'No account'}
          </div>
        `;
      });

      window.ethereum.on('chainChanged', (chainId) => {
        console.log('Chain changed:', chainId);
        document.getElementById('network-status').innerHTML = `
          <div class="status info">
            🔄 Chain changed to: <code>${chainId}</code>
          </div>
        `;
      });
    }
  </script>
</body>
</html>
