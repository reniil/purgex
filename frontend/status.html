<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Status - PurgeX</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://unpkg.com/ethers@6.9.0/dist/ethers.umd.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <script src="js/staking.js"></script>
</head>
<body>
  <div class="container">
    <h1>🔧 Status & Debug</h1>
    
    <div class="card">
      <h2>Connection Status</h2>
      <div id="connection-status">
        <button class="btn btn-primary connect-wallet-btn" data-action="connect-wallet">
          Connect Wallet
        </button>
        <div class="account-info" style="display: none;">
          <span class="wallet-address" data-action="copy">0x0000...0000</span>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Staking Status</h2>
      <div class="staking-stats">
        <div class="stat-card">
          <div class="stat-label">Your Staked PRGX</div>
          <div class="stat-value highlight user-staked">-- PRGX</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Pending Rewards</div>
          <div class="stat-value accent pending-rewards">-- PRGX</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Total Staked</div>
          <div class="stat-value total-staked">-- PRGX</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">APR</div>
          <div class="stat-value apr">--%</div>
        </div>
      </div>
      <button class="btn btn-secondary" onclick="testStaking()">Test Staking</button>
    </div>

    <div class="card">
      <h2>Debug Console</h2>
      <div id="debug-output" style="background: #0f172a; padding: 1rem; border-radius: 8px; font-family: monospace; max-height: 300px; overflow-y: auto; color: #10b981;">
        Waiting for debug output...
      </div>
      <button class="btn btn-secondary" onclick="clearDebug()">Clear</button>
    </div>
  </div>

  <script>
    // Debug logging
    function debug(message, type = 'info') {
      const output = document.getElementById('debug-output');
      const timestamp = new Date().toLocaleTimeString();
      const color = type === 'error' ? '#ef4444' : type === 'warn' ? '#f59e0b' : '#10b981';
      const div = document.createElement('div');
      div.style.color = color;
      div.textContent = `[${timestamp}] ${message}`;
      output.appendChild(div);
      output.scrollTop = output.scrollHeight;
    }

    function clearDebug() {
      document.getElementById('debug-output').innerHTML = '';
    }

    // Test staking
    async function testStaking() {
      debug('Testing staking functions...');
      
      if (!window.purgeXApp || !window.purgeXApp.signer) {
        debug('❌ Wallet not connected', 'error');
        return;
      }

      try {
        debug('✅ Wallet connected, testing staking...');
        
        if (window.stakingDashboard) {
          debug('✅ Staking dashboard loaded');
          await window.stakingDashboard.loadStakingData();
          debug('✅ Staking data loaded successfully');
        } else {
          debug('❌ Staking dashboard not loaded', 'error');
        }
      } catch (error) {
        debug(`❌ Error: ${error.message}`, 'error');
        console.error(error);
      }
    }

    // Override console methods
    const originalLog = console.log;
    const originalError = console.error;
    const originalWarn = console.warn;
    
    console.log = function(...args) {
      originalLog.apply(console, args);
      debug(args.join(' '), 'info');
    };
    
    console.error = function(...args) {
      originalError.apply(console, args);
      debug(args.join(' '), 'error');
    };
    
    console.warn = function(...args) {
      originalWarn.apply(console, args);
      debug(args.join(' '), 'warn');
    };

    // Initialize
    window.addEventListener('load', () => {
      debug('Status page loaded');
      debug(`Ethers.js version: ${ethers.version || 'v6.x'}`);
      debug(`Config loaded: ${!!window.CONFIG}`);
      debug(`App initialized: ${!!window.purgeXApp}`);
      debug(`Staking loaded: ${!!window.stakingDashboard}`);
    });
  </script>
</body>
</html>
