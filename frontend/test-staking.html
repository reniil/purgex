<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staking Test - PurgeX</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://unpkg.com/ethers@6.9.0/dist/ethers.umd.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <script src="js/staking.js"></script>
</head>
<body>
  <div class="container">
    <h1>🧪 Staking Input Test</h1>
    
    <div class="card">
      <h2>Wallet Connection</h2>
      <button class="btn btn-primary connect-wallet-btn" data-action="connect-wallet">
        Connect Wallet
      </button>
      <div class="account-info" style="display: none;">
        <span class="wallet-address" data-action="copy">0x0000...0000</span>
      </div>
    </div>

    <div class="card">
      <h2>Staking Form Test</h2>
      <div class="action-form">
        <div class="form-group">
          <label class="form-label">Amount</label>
          <input type="number" class="form-input stake-input" placeholder="0.00" step="0.01" min="0">
          <small class="form-hint">Available: <span class="user-balance">-- PRGX</span></small>
        </div>
        <div class="form-actions">
          <button class="btn btn-secondary stake-all-btn" data-action="stake-all">Stake All</button>
          <button class="btn btn-primary stake-btn" data-action="stake" disabled>Stake</button>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Debug Info</h2>
      <div id="debug-info" style="background: #0f172a; padding: 1rem; border-radius: 8px; font-family: monospace; color: #10b981;">
        <div>Input Value: <span id="input-value">--</span></div>
        <div>Input Max: <span id="input-max">--</span></div>
        <div>User Balance: <span id="user-balance-debug">--</span></div>
        <div>Formatted Balance: <span id="formatted-balance">--</span></div>
      </div>
      <button class="btn btn-secondary" onclick="updateDebug()">Update Debug</button>
    </div>

    <div class="card">
      <h2>Manual Test</h2>
      <button class="btn btn-secondary" onclick="testStakeAll()">Test Stake All</button>
      <button class="btn btn-secondary" onclick="testInputValue()">Test Input Value</button>
      <button class="btn btn-secondary" onclick="clearInput()">Clear Input</button>
    </div>
  </div>

  <script>
    function updateDebug() {
      const input = document.querySelector('.stake-input');
      const balanceSpan = document.querySelector('.user-balance');
      
      document.getElementById('input-value').textContent = input.value || 'empty';
      document.getElementById('input-max').textContent = input.max || 'not set';
      document.getElementById('user-balance-debug').textContent = balanceSpan.textContent;
      
      // Test formatting
      if (window.purgeXApp && window.purgeXApp.signer) {
        const testAmount = '20534205516201988825351911155';
        try {
          const formatted = window.purgeXApp.formatAmount(testAmount, 18, 4);
          document.getElementById('formatted-balance').textContent = formatted;
        } catch (error) {
          document.getElementById('formatted-balance').textContent = 'Error: ' + error.message;
        }
      } else {
        document.getElementById('formatted-balance').textContent = 'Wallet not connected';
      }
    }

    function testStakeAll() {
      if (window.stakingDashboard) {
        console.log('Testing stake all...');
        window.stakingDashboard.stakeAll().then(() => {
          console.log('Stake all completed');
          updateDebug();
        }).catch(error => {
          console.error('Stake all error:', error);
        });
      } else {
        alert('Staking dashboard not loaded');
      }
    }

    function testInputValue() {
      const input = document.querySelector('.stake-input');
      const testValue = '1000.1234';
      input.value = testValue;
      updateDebug();
    }

    function clearInput() {
      const input = document.querySelector('.stake-input');
      input.value = '';
      updateDebug();
    }

    // Auto-update debug every 2 seconds
    setInterval(updateDebug, 2000);

    // Initial update
    window.addEventListener('load', () => {
      setTimeout(updateDebug, 1000);
    });
  </script>
</body>
</html>
