<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PurgeX DEX - Token Search & Sweep</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#6366f1">
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <img src="images/logo.svg" alt="PurgeX" height="32">
        <h1>PurgeX</h1>
      </div>
      <nav class="nav">
        <a href="/" class="nav-link active">DEX</a>
        <a href="/tokenomics.html" class="nav-link">Tokenomics</a>
        <a href="/sweep.html" class="nav-link">Sweep</a>
      </nav>
      <div class="header-actions">
        <button id="clearDataBtn" class="btn btn-sm btn-outline">Clear Data</button>
        <button id="refreshBtn" class="btn btn-sm btn-primary">Refresh</button>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Search Section -->
      <section class="search-section">
        <div class="search-container">
          <input 
            type="text" 
            id="searchInput" 
            class="search-input" 
            placeholder="Search tokens by name, symbol, or address..."
            autocomplete="off"
          >
          <div id="searchSuggestions" class="search-suggestions"></div>
        </div>
        
        <div class="stats-bar">
          <div class="stat">
            <span class="stat-label">Tokens Indexed</span>
            <span class="stat-value" id="tokenCount">0</span>
          </div>
          <div class="stat">
            <span class="stat-label">Last Updated</span>
            <span class="stat-value" id="lastUpdated">Never</span>
          </div>
          <div class="stat">
            <span class="stat-label">Storage Used</span>
            <span class="stat-value" id="storageUsed">Calculating...</span>
          </div>
        </div>
      </section>

      <!-- Token List -->
      <section class="token-list-section">
        <div class="section-header">
          <h2>Discovered Tokens</h2>
          <div class="filter-controls">
            <select id="sortBy" class="select">
              <option value="liquidity">Sort by Liquidity</option>
              <option value="volume">Sort by Volume</option>
              <option value="name">Sort by Name</option>
              <option value="recent">Recently Updated</option>
            </select>
            <button id="trendingBtn" class="btn btn-outline btn-sm">Trending</button>
            <button id="recentBtn" class="btn btn-outline btn-sm">Recent</button>
          </div>
        </div>

        <div id="tokenList" class="token-list">
          <!-- Tokens will be rendered here -->
          <div class="loading-state">Loading tokens...</div>
        </div>

        <div id="loadMoreContainer" class="load-more" style="display: none;">
          <button id="loadMoreBtn" class="btn btn-outline">Load More</button>
        </div>
      </section>

      <!-- Token Detail Modal -->
      <div id="tokenModal" class="modal" style="display: none;">
        <div class="modal-content">
          <span class="close-modal">&times;</span>
          <div id="tokenDetailContent">
            <!-- Token details will be injected here -->
          </div>
          <div class="token-actions">
            <button id="importBtn" class="btn btn-primary">Import to PurgeX</button>
            <a id="viewOnDextools" target="_blank" class="btn btn-outline">View on DEXTools</a>
          </div>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <div class="footer-content">
        <p>PurgeX - Open-Source Token Indexer on PulseChain</p>
        <p class="text-sm text-muted">
          Data fetched from DEXTools • Stored locally in your browser
        </p>
      </div>
    </footer>
  </div>

  <!-- Scripts -->
  <script src="/js/config.js"></script>
  <script src="/js/storage.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/search.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
