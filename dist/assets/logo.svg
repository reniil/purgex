<svg width="200" height="60" viewBox="0 0 200 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Icon part -->
  <g transform="translate(10, 15)">
    <!-- Circle background -->
    <circle cx="15" cy="15" r="14" fill="url(#logoGrad)" stroke="#ffffff" stroke-width="1.5"/>
    
    <!-- Fire/sweep icon -->
    <path d="M 8 8 Q 11 5, 14 8 Q 17 11, 20 8 Q 23 5, 26 8" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
    
    <!-- PRGX text -->
    <text x="15" y="21" font-family="Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="white">PRGX</text>
  </g>
  
  <!-- Text part -->
  <text x="45" y="38" font-family="'Syne', sans-serif" font-size="28" font-weight="800" fill="url(#logoGrad)">PURGEX</text>
</svg>
